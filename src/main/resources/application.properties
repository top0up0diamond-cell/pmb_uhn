# ===== SERVER =====
server.port=${PORT:9500}

# ===== DATABASE =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/uhn_pmb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.connection-timeout=120000
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ===== EMAIL - BREVO REST API =====
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${MAIL_USERNAME:noreply@pmb-uhn.ac.id}
brevo.sender.name=PMB HKBP Nommensen

# ===== JWT =====
jwt.secret=${JWT_SECRET:local-dev-secret-key-min-32-chars-ok}
jwt.expiration=604800000

# ===== FILE UPLOAD =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=1MB
app.upload.dir=uploads/

# ===== SERVER TUNING =====
server.tomcat.connection-timeout=120000
server.tomcat.threads.max=200
server.tomcat.accept-count=100
server.compression.enabled=true
server.compression.min-response-size=1024
spring.mvc.async.request-timeout=120000

# ===== BRIVA =====
briva.api.key=${BRIVA_API_KEY:your-api-key}
briva.api.secret=${BRIVA_API_SECRET:your-api-secret}
briva.api.url=https://apibriva.bri.co.id/v2
briva.client.id=${BRIVA_CLIENT_ID:your-client-id}

# ===== APP =====
app.name=PMB HKBP Nommensen
app.version=1.0.0
app.timezone=Asia/Jakarta
app.frontend.url=${FRONTEND_URL:http://localhost:9500}
resend.api-key=${RESEND_API_KEY:}
gemini.api.key=${GEMINI_API_KEY:}

# ===== STATIC FILES =====
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.max-age=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.chain.cache=false

# ===== THYMELEAF =====
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.check-template-location=true

# ===== DEVTOOLS (auto-disabled saat JAR) =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===== LOGGING =====
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.uhn.pmb=INFO