<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Daftar Ulang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { margin: 0; padding: 5px; }
            .container-fluid { box-shadow: none; padding: 5px; margin: 0; }
            .table { font-size: 13px !important; width: 100%; }
            .table thead { background: #e9ecef; }
            .table td, .table th { padding: 8px 6px !important; }
            h1 { font-size: 18px; margin-bottom: 5px; }
            .info-text { display: none; }
        }
        body { font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif; background: #f8f9fa; padding: 10px; }
        .container-fluid { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .table { margin-top: 20px; width: 100%; table-layout: auto; }
        .table thead { background: #e9ecef; }
        .btn-group-actions { margin-bottom: 20px; }
        .loading { display: none; }
        h1 { color: #333; margin-bottom: 10px; font-weight: 600; }
        .info-text { color: #666; font-size: 14px; margin-bottom: 20px; }
        .table-responsive { width: 100%; overflow-x: auto; }
        .badge { font-size: 12px; }
        .doc-link { color: #0d6efd; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container-fluid px-3">
        <div class="d-flex justify-content-between align-items-center no-print">
            <div>
                <h1>Data Daftar Ulang</h1>
                <p class="info-text">Tabel lengkap semua data daftar ulang dengan dokumen pendukung</p>
            </div>
            <div class="btn-group-actions">
                <button class="btn btn-info" id="btnDownloadBundle" onclick="downloadReenrollmentBundle()"><i class="fas fa-file-archive"></i> Download Bundle (ZIP)</button>
            </div>
        </div>

        <div class="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p>Memuat data...</p>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover" id="dataTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>NIK</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Catatan Validasi</th>
                        <th>Dokumen</th>
                        <th>Disubmit</th>
                        <th>Divalidasi</th>
                        <th>Dibuat</th>                        <th>Aksi</th>                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <div class="text-center mt-3 text-muted no-print">
            <small>Total: <strong id="totalRecords">0</strong> data daftar ulang</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let tableData = [];

        async function loadData() {
            try {
                const authToken = localStorage.getItem('authToken') || window.authToken;
                const response = await fetch('/admin/api/table/reenrollments', {
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                const result = await response.json();
                
                if (result.success) {
                    tableData = result.data;
                    populateTable();
                    document.getElementById('totalRecords').textContent = result.totalRecords;
                    console.log('✅ Data loaded:', result.totalRecords, 'records');
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('❌ Error loading data:', error);
                alert('Gagal memuat data: ' + error.message);
            }
        }

        function populateTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            tableData.forEach((row, index) => {
                const statusBadge = getStatusBadge(row.status);
                const docHTML = row.documents && row.documents.length > 0 
                    ? row.documents.map(d => `<a href="/api/files/view/${d.path}" target="_blank" class="doc-link">${d.type}</a>`).join(', ')
                    : '-';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${row.studentName}</td>
                    <td>${row.nik}</td>
                    <td>${row.email}</td>
                    <td>${statusBadge}</td>
                    <td>${row.validationNotes || '-'}</td>
                    <td>${docHTML}</td>
                    <td>${row.submittedAt ? new Date(row.submittedAt).toLocaleDateString('id-ID') : '-'}</td>
                    <td>${row.validatedAt ? new Date(row.validatedAt).toLocaleDateString('id-ID') : '-'}</td>
                    <td>${new Date(row.createdAt).toLocaleDateString('id-ID')}</td>
                    <td style="text-align: center;">
                        <button class="btn btn-sm btn-success" onclick="downloadPerPerson('${row.studentName}', ${index})" title="Download dokumen siswa ini">
                            <i class="fas fa-download"></i> Download
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getStatusBadge(status) {
            const statusMap = {
                'INCOMPLETE': '<span class="badge bg-warning">Belum Lengkap</span>',
                'SUBMITTED': '<span class="badge bg-info">Submitted</span>',
                'APPROVED': '<span class="badge bg-success">Disetujui</span>',
                'REJECTED': '<span class="badge bg-danger">Ditolak</span>'
            };
            return statusMap[status] || `<span class="badge bg-secondary">${status}</span>`;
        }

        async function downloadPerPerson(studentName, rowIndex) {
            if (tableData.length === 0 || !tableData[rowIndex] || !tableData[rowIndex].documents) {
                alert('Tidak ada dokumen untuk siswa ini.');
                return;
            }

            const row = tableData[rowIndex];
            const btn = event.target.closest('button');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Loading...';

            try {
                const JSZip = window.JSZip;
                const zip = new JSZip();
                let fetchedCount = 0;
                let totalCount = 0;

                for (const doc of row.documents) {
                    if (!doc.path) continue;
                    totalCount++;
                    try {
                        const res = await fetch(`/api/files/view/${doc.path}`, {
                            headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('authToken') || window.authToken) }
                        });
                        if (!res.ok) {
                            console.warn('Gagal fetch:', doc.path, res.status);
                            continue;
                        }
                        const blob = await res.blob();
                        const fileName = doc.path.split('/').pop() || (doc.type + '-' + Date.now() + '.pdf');
                        zip.file(fileName, blob);
                        fetchedCount++;
                    } catch (e) {
                        console.warn('Error fetching doc:', doc.path, e);
                    }
                }

                if (fetchedCount === 0) {
                    alert('Tidak ada dokumen yang berhasil dimuat.');
                    return;
                }

                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `dokumen-${studentName.replace(/[^a-zA-Z0-9]/g, '-')}-${new Date().toISOString().slice(0, 10)}.zip`;
                document.body.appendChild(a);
                a.click();
                URL.revokeObjectURL(url);
                a.remove();

                alert(`✅ ZIP berhasil dibuat! ${fetchedCount} dari ${totalCount} dokumen.`);
            } catch (e) {
                console.error('Error:', e);
                alert('Gagal membuat ZIP: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }

        async function downloadReenrollmentBundle() {
            if (tableData.length === 0) {
                alert('Tidak ada data untuk didownload. Muat halaman terlebih dahulu.');
                return;
            }

            const btn = document.getElementById('btnDownloadBundle');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Menyiapkan ZIP...';

            try {
                const zip = new JSZip();
                let totalFiles = 0;
                let fetchedFiles = 0;

                for (const row of tableData) {
                    if (!row.documents || row.documents.length === 0) continue;

                    // Sanitize folder name: email-nama
                    const folderName = ((row.email || '') + '-' + (row.studentName || 'mahasiswa'))
                        .replace(/[^a-zA-Z0-9_\-\.]/g, '-').substring(0, 80);
                    const folder = zip.folder(folderName);

                    for (const doc of row.documents) {
                        if (!doc.path) continue;
                        totalFiles++;
                        try {
                            const res = await fetch(`/api/files/view/${doc.path}`, {
                                headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('authToken') || window.authToken) }
                            });
                            if (!res.ok) { console.warn('Gagal fetch:', doc.path, res.status); continue; }
                            const blob = await res.blob();
                            const fileName = doc.path.split('/').pop() || (doc.type + '-' + Date.now() + '.pdf');
                            folder.file(fileName, blob);
                            fetchedFiles++;
                            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> ' + fetchedFiles + '/' + totalFiles + ' file...';
                        } catch (e) {
                            console.warn('Error fetching doc:', doc.path, e);
                        }
                    }
                }

                if (fetchedFiles === 0) {
                    alert('Tidak ada dokumen yang berhasil dimuat. Periksa apakah dokumen sudah diupload.');
                    return;
                }

                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'reenrollments-' + new Date().toISOString().slice(0, 10) + '.zip';
                document.body.appendChild(a);
                a.click();
                URL.revokeObjectURL(url);
                a.remove();

                alert('ZIP berhasil dibuat! ' + fetchedFiles + ' dari ' + totalFiles + ' file dimasukkan.');
            } catch (e) {
                console.error('Error generating ZIP:', e);
                alert('Gagal membuat ZIP: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
