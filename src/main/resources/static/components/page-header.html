<!-- Page Header Banner Component (Customizable per page) -->
<div class="page-header-banner" id="pageHeaderBanner">
  <div class="page-header-content">
    <p class="page-header-welcome">WELCOME TO UNIVERSITAS HKBP NOMMENSEN</p>
    <h1 class="page-header-title" id="pageHeaderTitle">Alur dan Status Pendaftaran </h1>
    <p class="page-header-subtitle" id="pageHeaderSubtitle">Halaman ini menampilkan alur dan status pendaftaran calon mahasiswa. Lakukan pendaftaran segera!</p>
  </div>
</div>

<style>
.page-header-banner {
  background: linear-gradient(135deg, #1a472a 0%, #27ae60 100%);
  color: white;
  padding: 50px 20px;
  text-align: center;
  margin-bottom: 30px;
  clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
}

.page-header-content {
  max-width: 1200px;
  margin: 0 auto;
}

.page-header-welcome {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 2px;
  margin: 0 0 15px 0;
  text-transform: uppercase;
  opacity: 0.95;
}

.page-header-title {
  font-size: 42px;
  font-weight: 800;
  margin: 10px 0 15px 0;
  line-height: 1.2;
}

.page-header-subtitle {
  font-size: 16px;
  font-weight: 400;
  margin: 0;
  opacity: 0.9;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
}

@media (max-width: 768px) {
  .page-header-banner {
    padding: 35px 20px;
  }

  .page-header-title {
    font-size: 28px;
  }

  .page-header-subtitle {
    font-size: 14px;
  }
}
</style>

<script>
/**
 * Set page header title dan subtitle
 * Usage: setPageHeader('Judul Page', 'Deskripsi page')
 */
function setPageHeader(title, subtitle) {
  const titleEl = document.getElementById('pageHeaderTitle');
  const subtitleEl = document.getElementById('pageHeaderSubtitle');
  
  if (titleEl) titleEl.textContent = title;
  if (subtitleEl) subtitleEl.textContent = subtitle;
  
  console.log('✅ Page header set:', { title, subtitle });
}
</script>
