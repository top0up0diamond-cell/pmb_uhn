<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Token & Auth - PMB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; }
        .card { margin-bottom: 20px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; max-height: 300px; overflow-y: auto; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-lock"></i> Test Token & Authentication</h1>
        
        <div class="card">
            <div class="card-header"><i class="fas fa-map-marker-alt"></i> LocalStorage Status</div>
            <div class="card-body">
                <p><strong>authToken:</strong> <span id="tokenStatus" class="error">Loading...</span></p>
                <p><strong>Token Length:</strong> <span id="tokenLength">-</span> characters</p>
                <p><strong>User Role:</strong> <span id="userRole">-</span></p>
                <details>
                    <summary>Show Full Token</summary>
                    <pre id="fullToken">Loading...</pre>
                </details>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fas fa-flask"></i> Test API Endpoints</div>
            <div class="card-body">
                <button class="btn btn-primary mb-2" onclick="testDebugAuth()">Test /api/camaba/debug-auth (NO auth required)</button>
                <button class="btn btn-info mb-2" onclick="testGetAdmissionForm()">Test /api/camaba/admission-form (WITH auth)</button>
                <button class="btn btn-secondary mb-2" onclick="testLoginEndpoint()">Test /api/auth/login</button>
                <div id="testResults"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fas fa-wrench"></i> Actions</div>
            <div class="card-body">
                <button class="btn btn-warning" onclick="clearStorage()">Clear LocalStorage</button>
                <button class="btn btn-info" onclick="goLogin()">Go to Login</button>
                <button class="btn btn-primary" onclick="goDashboard()">Go to Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        function displayResult(title, response, status, success = true) {
            const results = document.getElementById('testResults');
            const cssClass = success ? 'success' : 'error';
            results.innerHTML += `
                <div class="alert alert-${success ? 'success' : 'danger'} mt-2">
                    <strong>${title}</strong> (Status: ${status})
                    <pre>${JSON.stringify(response, null, 2)}</pre>
                </div>
            `;
        }

        async function testDebugAuth() {
            try {
                const res = await fetch('/api/camaba/debug-auth');
                const data = await res.json();
                displayResult('Debug Auth (No Token Required)', data, res.status);
            } catch (err) {
                displayResult('Debug Auth Error', { error: err.message }, 'ERROR', false);
            }
        }

        async function testGetAdmissionForm() {
            try {
                const token = localStorage.getItem('authToken');
                if (!token) {
                    displayResult('Get Admission Form', { error: 'No token found in localStorage' }, 'NO_TOKEN', false);
                    return;
                }

                const res = await fetch('/api/camaba/admission-form', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await res.json();
                displayResult('Get Admission Form', data, res.status, res.ok);
            } catch (err) {
                displayResult('Get Admission Form Error', { error: err.message }, 'ERROR', false);
            }
        }

        async function testLoginEndpoint() {
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'student@test.com',
                        password: 'student123'
                    })
                });

                const data = await res.json();
                displayResult('Login Test', data, res.status, res.ok);
            } catch (err) {
                displayResult('Login Error', { error: err.message }, 'ERROR', false);
            }
        }

        function clearStorage() {
            localStorage.clear();
 alert(' LocalStorage cleared');
            location.reload();
        }

        function goLogin() {
            window.location.href = '/login.html';
        }

        function goDashboard() {
            window.location.href = '/dashboard-camaba.html';
        }

        // Check token on page load
        window.addEventListener('load', () => {
            const token = localStorage.getItem('authToken');
            const role = localStorage.getItem('userRole');
            
            if (token) {
                document.getElementById('tokenStatus').innerHTML = '<i class="fas fa-check-circle text-success"></i> Token Found';
                document.getElementById('tokenStatus').className = 'success';
                document.getElementById('tokenLength').textContent = token.length;
                document.getElementById('fullToken').textContent = token;
            } else {
                document.getElementById('tokenStatus').innerHTML = '<i class="fas fa-times-circle text-danger"></i> No Token';
                document.getElementById('tokenStatus').className = 'error';
            }

            document.getElementById('userRole').textContent = role || 'Not set';
        });
    </script>
</body>
</html>
