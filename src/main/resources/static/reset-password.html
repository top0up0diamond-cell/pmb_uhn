<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - PMB HKBP Nommensen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a472a;
            --secondary: #e74c3c;
        }
        
        body {
            background-image: linear-gradient(rgba(178, 245, 162, 0.9), rgba(68, 124, 36, 0.9)), url('/gambar/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .reset-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 50px;
        }
        
        .reset-container h2 {
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }
        
        .reset-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .form-control {
            border: 2px solid #ddd;
            border-radius: 5px;
            padding: 12px 15px;
            font-size: 16px;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: none;
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--primary);
            font-size: 18px;
            padding: 5px;
        }
        
        .password-toggle:hover {
            opacity: 0.7;
        }
        
        .password-strength {
            margin-top: 10px;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }
        
        .strength-text {
            font-size: 12px;
            margin-top: 5px;
            color: #666;
        }
        
        .btn-reset {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            margin-top: 20px;
        }
        
        .btn-reset:hover {
            background: #c0392b;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .alert {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h2><i class="fas fa-key"></i> Buat Password Baru</h2>
        <p>Silahkan buat password baru yang kuat untuk akun Anda</p>
        
        <div class="alert alert-danger error-alert" role="alert" id="errorAlert" style="display: none;">
            <span id="errorMessage"></span>
        </div>
        
        <div class="alert alert-success success-alert" role="alert" id="successAlert" style="display: none;">
            <span id="successMessage"></span>
        </div>
        
        <form id="resetForm">
            <div class="form-group">
                <label for="password" class="form-label">Password Baru</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="password" name="password" required placeholder="Buat password yang kuat">
                    <span class="password-toggle" onclick="togglePassword('password')"><i class="fas fa-eye"></i></span>
                </div>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text">
                    Kekuatan: <span id="strengthText">Lemah</span>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword" class="form-label">Konfirmasi Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required placeholder="Ulangi password Anda">
                    <span class="password-toggle" onclick="togglePassword('confirmPassword')"><i class="fas fa-eye"></i></span>
                </div>
            </div>
            
            <button type="submit" class="btn-reset">Reset Password</button>
        </form>
        
        <div class="back-link">
            <a href="/login.html">← Kembali ke Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get token from URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        
        if (!token) {
            document.getElementById('errorAlert').style.display = 'block';
            document.getElementById('errorMessage').textContent = 'Link tidak valid atau sudah kadaluarsa';
            document.getElementById('resetForm').style.display = 'none';
        }
        
        // Toggle password visibility
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
            } else {
                field.type = 'password';
            }
        }
        
        // Password strength calculator
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            const strengths = ['', 'Lemah', 'Cukup', 'Baik', 'Kuat', 'Sangat Kuat'];
            const colors = ['', '#ff6b6b', '#ffa500', '#ffd700', '#90EE90', '#228B22'];
            
            bar.style.width = (strength * 20) + '%';
            bar.style.background = colors[strength];
            text.textContent = strengths[strength];
        });
        
        // Form submission
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            const successAlert = document.getElementById('successAlert');
            const successMessage = document.getElementById('successMessage');
            const btn = e.target.querySelector('.btn-reset');
            
            // Validation
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Password tidak cocok!';
                errorAlert.style.display = 'block';
                return;
            }
            
            if (password.length < 8) {
                errorMessage.textContent = 'Password minimal 8 karakter!';
                errorAlert.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Mengubah Password...';
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token, password, confirmPassword })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successMessage.textContent = 'Password berhasil diubah! Silahkan login dengan password baru Anda.';
                    successAlert.style.display = 'block';
                    errorAlert.style.display = 'none';
                    document.getElementById('resetForm').style.display = 'none';
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);
                } else {
                    errorMessage.textContent = data.message || 'Gagal mengubah password. Coba lagi.';
                    errorAlert.style.display = 'block';
                    successAlert.style.display = 'none';
                }
            } catch (error) {
                errorMessage.textContent = 'Terjadi kesalahan: ' + error.message;
                errorAlert.style.display = 'block';
                successAlert.style.display = 'none';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
