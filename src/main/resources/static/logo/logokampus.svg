<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a472a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" stroke="#fff" stroke-width="3"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="85" fill="#fff" opacity="0.1"/>
  
  <!-- Graduation cap -->
  <g transform="translate(100, 70)">
    <!-- Cap board -->
    <rect x="-35" y="0" width="70" height="8" fill="#fff" rx="2"/>
    <!-- Cap cover -->
    <path d="M -35 8 Q 0 -15 35 8" fill="#fff"/>
    <!-- Tassel -->
    <line x1="0" y1="8" x2="0" y2="35" stroke="#fff" stroke-width="2"/>
    <circle cx="0" cy="40" r="3" fill="#fff"/>
  </g>
  
  <!-- Book symbol -->
  <g transform="translate(100, 100)">
    <path d="M -15 -10 L -15 15 L 15 15 L 15 -10 Z" fill="none" stroke="#fff" stroke-width="2"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#fff" stroke-width="1.5"/>
    <line x1="-15" y1="7" x2="15" y2="7" stroke="#fff" stroke-width="1.5"/>
  </g>
  
  <!-- University name (text will be added via CSS or HTML) -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">UHN NOMMENSEN</text>
</svg>