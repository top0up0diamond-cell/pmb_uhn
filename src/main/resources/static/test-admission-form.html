<!DOCTYPE html>
<html>
<head>
    <title>Test Admission Form API</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 800px; }
        h1 { color: #333; }
        .step { margin: 20px 0; padding: 15px; background: #f9f9f9; border-left: 4px solid #0066cc; }
        .step-title { font-weight: bold; color: #0066cc; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .success { border-left-color: #28a745; color: #28a745; }
        .error { border-left-color: #dc3545; color: #dc3545; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-flask"></i> Test Admission Form API</h1>
        
        <div class="step">
            <div class="step-title">Step 1: Login</div>
            <button onclick="testLogin()">Test Login</button>
            <pre id="loginResult"></pre>
        </div>

        <div class="step">
            <div class="step-title">Step 2: Get Admission Form</div>
            <button onclick="testAdmissionForm()">Test Admission Form</button>
            <pre id="formResult"></pre>
        </div>

        <div class="step">
            <div class="step-title">Full Response Data</div>
            <pre id="fullResponse"></pre>
        </div>
    </div>

    <script>
        let authToken = '';

        async function testLogin() {
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'student@test.com',
                        password: 'student123'
                    })
                });
                const data = await res.json();
                authToken = data.data.token;
                document.getElementById('loginResult').innerHTML = '<i class="fas fa-check-circle text-success"></i> SUCCESS\n' + JSON.stringify(data, null, 2);
                document.querySelector('.step:nth-child(1)').classList.add('success');
            } catch (err) {
                document.getElementById('loginResult').innerHTML = '<i class="fas fa-times-circle text-danger"></i> ERROR\n' + err.message;
                document.querySelector('.step:nth-child(1)').classList.add('error');
            }
        }

        async function testAdmissionForm() {
            if (!authToken) {
                alert('Please login first!');
                return;
            }
            try {
                const res = await fetch('/api/camaba/admission-form', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('formResult').innerHTML = '<i class="fas fa-check-circle text-success"></i> SUCCESS (HTTP ' + res.status + ')';
                    document.querySelector('.step:nth-child(2)').classList.add('success');
                    
                    document.getElementById('fullResponse').textContent = JSON.stringify(data, null, 2);
                } else {
                    document.getElementById('formResult').innerHTML = '<i class="fas fa-times-circle text-danger"></i> ERROR (HTTP ' + res.status + ')\n' + JSON.stringify(data, null, 2);
                    document.querySelector('.step:nth-child(2)').classList.add('error');
                }
            } catch (err) {
                document.getElementById('formResult').innerHTML = '<i class="fas fa-times-circle text-danger"></i> ERROR\n' + err.message;
                document.querySelector('.step:nth-child(2)').classList.add('error');
            }
        }

        // Auto-test on load
        window.addEventListener('load', () => {
            console.log('Page loaded, you can click the buttons to test the API');
        });
    </script>
</body>
</html>
