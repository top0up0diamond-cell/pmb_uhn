<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - PMB HKBP Nommensen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a472a;
            --secondary: #e74c3c;
        }
        
     body {
            background-image: linear-gradient(rgba(178, 245, 162, 0.9), rgba(68, 124, 36, 0.9)), url('/gambar/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .forgot-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            margin: 40px auto;
            padding: 50px;
        }
        
        .forgot-container h2 {
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }
        
        .forgot-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .form-control {
            border: 2px solid #ddd;
            border-radius: 5px;
            padding: 12px 15px;
            font-size: 16px;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: none;
        }
        
        .btn-send {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            margin-top: 20px;
        }
        
        .btn-send:hover {
            background: #c0392b;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .alert {
            margin-bottom: 20px;
        }
        
        .step-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 14px;
        }
        
        .step-info strong {
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <h2><i class="fas fa-lock"></i> Lupa Password?</h2>
        <p>Kami akan mengirimkan link verifikasi ke email Anda untuk mereset password</p>
        
        <div class="step-info">
            <strong>Langkah-langkah:</strong>
            1. Masukkan email Anda<br>
            2. Kami akan mengirim link verifikasi<br>
            3. Buka link dan buat password baru
        </div>
        
        <div class="alert alert-danger error-alert" role="alert" id="errorAlert" style="display: none;">
            <span id="errorMessage"></span>
        </div>
        
        <div class="alert alert-success success-alert" role="alert" id="successAlert" style="display: none;">
            <span id="successMessage"></span>
        </div>
        
        <form id="forgotForm">
            <div class="form-group">
                <label for="email" class="form-label">Email Anda</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="Masukkan email yang terdaftar">
                <small class="text-muted">Pastikan email aktif untuk menerima link verifikasi</small>
            </div>
            
            <button type="submit" class="btn-send">Kirim Link Verifikasi</button>
        </form>
        
        <div class="back-link">
            Ingat password Anda? <a href="/login.html">Login di sini</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            const successAlert = document.getElementById('successAlert');
            const successMessage = document.getElementById('successMessage');
            const btn = e.target.querySelector('.btn-send');
            
            btn.disabled = true;
            btn.textContent = 'Mengirim...';
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successMessage.textContent = data.message || 'Link verifikasi telah dikirim ke email Anda. Silahkan cek email Anda dalam 15 menit.';
                    successAlert.style.display = 'block';
                    errorAlert.style.display = 'none';
                    document.getElementById('forgotForm').reset();
                    
                    // Redirect after 3 seconds (optional)
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 5000);
                } else {
                    errorMessage.textContent = data.message || 'Email tidak ditemukan. Silahkan daftar terlebih dahulu.';
                    errorAlert.style.display = 'block';
                    successAlert.style.display = 'none';
                }
            } catch (error) {
                errorMessage.textContent = 'Terjadi kesalahan: ' + error.message;
                errorAlert.style.display = 'block';
                successAlert.style.display = 'none';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Kirim Link Verifikasi';
            }
        });
    </script>
</body>
</html>
