<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Form Fix - 9092</title>
    <style>
        body { font-family: Arial; background: #667eea; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; }
        h1 { color: #333; }
        .step { background: #f5f5f5; padding: 15px; margin: 15px 0; border-left: 4px solid #667eea; }
        button { background: #667eea; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; }
        button:hover { background: #764ba2; }
        .result { margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 4px; max-height: 400px; overflow-y: auto; font-size: 12px; font-family: monospace; }
        .success { border-left: 4px solid #28a745; }
        .error { border-left: 4px solid #dc3545; background: #fff5f5; }
        .info { border-left: 4px solid #17a2b8; background: #f0f7fa; }
        .loading { color: #999; }
    </style>
</head>
<body>
    <div class="box">
        <h1><i class="fas fa-flask"></i> Test Form Fix (Port 9092)</h1>
        
        <div class="step">
            <h3>1️⃣ Step 1: Login Test</h3>
            <p>student@test.com / student123</p>
            <button onclick="login()"><i class="fas fa-unlock"></i> Login</button>
            <div id="login" class="result"></div>
        </div>

        <div class="step">
            <h3>2️⃣ Step 2: Form Access Test</h3>
            <p>GET /api/camaba/admission-form</p>
            <button onclick="testForm()"><i class="fas fa-clipboard-list"></i> Get Form</button>
            <div id="form" class="result"></div>
        </div>

        <div class="step">
            <h3>3️⃣ Result</h3>
            <div id="final" class="result info"></div>
        </div>
    </div>

    <script>
        const PORT = 9092;
        let token = null;

        async function login() {
            const div = document.getElementById('login');
            div.innerHTML = '<div class="loading"><i class="fas fa-hourglass-half"></i> Logging in...</div>';
            
            try {
                const res = await fetch(`http://localhost:${PORT}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'student@test.com', password: 'student123' })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    token = data.token;
                    div.innerHTML = `<div class="success"><i class="fas fa-check-circle text-success"></i> SUCCESS<br>Token: ${token.substring(0,50)}...${token.slice(-20)}<br>Role: ${data.role}</div>`;
                    document.getElementById('final').innerHTML = '<i class="fas fa-hourglass-half"></i> Step completed';
                } else {
                    div.innerHTML = `<div class="error"><i class="fas fa-times-circle text-danger"></i> FAILED<br>${JSON.stringify(data, null, 2)}</div>`;
                }
            } catch (e) {
                div.innerHTML = `<div class="error"><i class="fas fa-times-circle text-danger"></i> ERROR: ${e.message}</div>`;
            }
        }

        async function testForm() {
            const div = document.getElementById('form');
            
            if (!token) {
                div.innerHTML = '<div class="error"><i class="fas fa-times-circle text-danger"></i> No token - do Login first!</div>';
                return;
            }
            
            div.innerHTML = '<div class="loading"><i class="fas fa-hourglass-half"></i> Fetching form...</div>';
            
            try {
                const res = await fetch(`http://localhost:${PORT}/api/camaba/admission-form`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await res.json();
                
                if (res.status === 200) {
                    let html = `<div class="success"><i class="fas fa-check-circle text-success"></i> SUCCESS (HTTP 200)<br><br>Form Found!<br>`;
                    html += JSON.stringify(data, null, 2);
                    html += `</div>`;
                    div.innerHTML = html;
                    document.getElementById('final').innerHTML = '<i class="fas fa-check-circle text-success"></i> FIX IS WORKING!<br>Student dapat view/edit form sekarang!<br><a href="http://localhost:9092/dashboard-camaba.html" target="_blank" style="color: #667eea; font-weight: bold;">→ Buka Dashboard</a>';
                } else {
                    let html = `<div class="error"><i class="fas fa-times-circle text-danger"></i> FAILED (HTTP ${res.status})<br><br>`;
                    html += JSON.stringify(data, null, 2);
                    html += `</div>`;
                    div.innerHTML = html;
                    document.getElementById('final').innerHTML = '<i class="fas fa-times-circle text-danger"></i> MASIH ADA MASALAH!';
                }
            } catch (e) {
                div.innerHTML = `<div class="error"><i class="fas fa-times-circle text-danger"></i> ERROR: ${e.message}</div>`;
                document.getElementById('final').innerHTML = `<i class="fas fa-times-circle text-danger"></i> ERROR: ${e.message}`;
            }
        }
    </script>
</body>
</html>
