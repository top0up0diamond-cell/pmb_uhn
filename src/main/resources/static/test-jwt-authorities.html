<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Authorities Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; font-family: monospace; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .info { color: blue; font-weight: bold; }
        .warning { color: orange; font-weight: bold; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-lock"></i> JWT Authorities Testing</h1>
    <p><em>This page tests if JWT tokens now include authorities/roles</em></p>

    <div class="test-section">
        <h3>Step 1: Login Credentials</h3>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" class="form-control" value="validasi@pmb.com" placeholder="validasi@pmb.com">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" class="form-control" value="validasi123" placeholder="validasi123">
        </div>
        <button class="btn btn-primary" onclick="testLogin()"><i class="fas fa-unlock"></i> Login</button>
        <button class="btn btn-secondary" onclick="clearStorageAndToken()"><i class="fas fa-trash"></i> Clear Token</button>
    </div>

    <div class="test-section">
        <h3>Step 2: JWT Token Analysis</h3>
        <button class="btn btn-info" onclick="decodeAndDisplayToken()"><i class="fas fa-search"></i> Decode Token</button>
        <div id="tokenAnalysis" style="margin-top: 15px;"></div>
    </div>

    <div class="test-section">
        <h3>Step 3: Test Protected Endpoints</h3>
        <p><em>These endpoints need authorities in JWT to work</em></p>
        <button class="btn btn-warning" onclick="testEndpoint('/api/validasi/formulir/1/details')">
            <i class="fas fa-clipboard-list"></i> Test /api/validasi/formulir/1/details
        </button>
        <button class="btn btn-warning" onclick="testEndpoint('/api/send-reminder')">
            <i class="fas fa-envelope"></i> Test /api/send-reminder
        </button>
        <button class="btn btn-warning" onclick="testEndpoint('/admin/api/exam/student-list')">
            <i class="fas fa-users"></i> Test /admin/api/exam/student-list  
        </button>
        <div id="endpointResults" style="margin-top: 15px;"></div>
    </div>

    <div class="test-section">
        <h3>Console Output</h3>
        <div id="consoleLog" style="background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 3px; max-height: 300px; overflow-y: auto; font-size: 12px;"></div>
    </div>
</div>

<script>
    let logs = [];
    
    function logToConsole(message, type = 'info') {
        const timestamp = new Date().toLocaleTimeString();
        const prefix = {
            'info': '<i class="fas fa-info-circle"></i>',
            'success': '<i class="fas fa-check-circle text-success"></i>',
            'error': '<i class="fas fa-times-circle text-danger"></i>',
            'warning': '<i class="fas fa-exclamation-triangle text-warning"></i>'
        }[type] || '<i class="fas fa-info-circle"></i>';
        
        const fullMessage = `[${timestamp}] ${prefix} ${message}`;
        logs.push(fullMessage);
        console.log(fullMessage);
        
        const consoleDiv = document.getElementById('consoleLog');
        consoleDiv.innerHTML = logs.map(l => `<div>${l}</div>`).join('');
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    async function testLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        logToConsole(`<i class="fas fa-lock"></i> Testing login with: ${email}`, 'info');

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const text = await response.text();
            logToConsole(`<i class="fas fa-satellite-dish"></i> Response status: ${response.status}`, response.ok ? 'success' : 'error');

            if (!text) {
                logToConsole(`<i class="fas fa-exclamation-triangle text-warning"></i> Response body is empty!`, 'warning');
                return;
            }

            const data = JSON.parse(text);
            
            if (data.token) {
                sessionStorage.setItem('authToken', data.token);
                sessionStorage.setItem('userRole', data.role);
                logToConsole(`<i class="fas fa-check-circle text-success"></i> Token saved (${data.token.length} chars)`, 'success');
                logToConsole(`<i class="fas fa-user"></i> Role: ${data.role}`, 'success');
                
                // Auto-decode after login
                setTimeout(() => decodeAndDisplayToken(), 500);
            } else {
                logToConsole(`<i class="fas fa-times-circle text-danger"></i> No token in response!`, 'error');
                logToConsole(`Response: ${JSON.stringify(data)}`, 'error');
            }
        } catch (e) {
            logToConsole(`<i class="fas fa-times-circle text-danger"></i> Login failed: ${e.message}`, 'error');
        }
    }

    function decodeAndDisplayToken() {
        const token = sessionStorage.getItem('authToken') || localStorage.getItem('authToken');
        const analysisDiv = document.getElementById('tokenAnalysis');

        if (!token) {
            analysisDiv.innerHTML = '<p class="error"><i class="fas fa-times-circle text-danger"></i> No token found in localStorage</p>';
            logToConsole('<i class="fas fa-times-circle text-danger"></i> No token in localStorage', 'error');
            return;
        }

        try {
            const parts = token.split('.');
            if (parts.length !== 3) {
                throw new Error('Invalid token format (not 3 parts)');
            }

            const payload = JSON.parse(atob(parts[1]));
            logToConsole(`<i class="fas fa-unlock"></i> JWT Decoded successfully`, 'success');

            let html = '<h5><i class="fas fa-unlock"></i> JWT Token Payload:</h5><pre>';
            html += JSON.stringify(payload, null, 2);
            html += '</pre>';

            html += '<h5><i class="fas fa-chart-bar"></i> Analysis:</h5><ul>';
            html += `<li><strong>Subject (Email):</strong> <span class="info">${payload.sub}</span></li>`;
            html += `<li><strong>Issued At:</strong> ${new Date(payload.iat * 1000).toLocaleString()}</li>`;
            html += `<li><strong>Expires At:</strong> ${new Date(payload.exp * 1000).toLocaleString()}</li>`;
            
            if (payload.authorities) {
                html += `<li><strong>Authorities:</strong> <span class="success"><i class="fas fa-check-circle text-success"></i> ${payload.authorities}</span></li>`;
                logToConsole(`<i class="fas fa-check-circle text-success"></i> Authorities found in token: ${payload.authorities}`, 'success');
            } else if (payload.roles) {
                html += `<li><strong>Roles:</strong> <span class="success"><i class="fas fa-check-circle text-success"></i> ${payload.roles}</span></li>`;
                logToConsole(`<i class="fas fa-check-circle text-success"></i> Roles found in token: ${payload.roles}`, 'success');
            } else {
                html += `<li><strong>Authorities:</strong> <span class="error"><i class="fas fa-times-circle text-danger"></i> NONE (PROBLEM!)</span></li>`;
                logToConsole(`<i class="fas fa-times-circle text-danger"></i> No authorities in token!`, 'error');
            }
            
            html += '</ul>';
            analysisDiv.innerHTML = html;
        } catch (e) {
            logToConsole(`<i class="fas fa-times-circle text-danger"></i> Token decode failed: ${e.message}`, 'error');
            analysisDiv.innerHTML = `<p class="error"><i class="fas fa-times-circle text-danger"></i> Failed to decode token: ${e.message}</p>`;
        }
    }

    async function testEndpoint(endpoint) {
        const token = sessionStorage.getItem('authToken') || localStorage.getItem('authToken');
        const resultsDiv = document.getElementById('endpointResults');

        if (!token) {
            logToConsole(`<i class="fas fa-times-circle text-danger"></i> No token - login first!`, 'error');
            resultsDiv.innerHTML = '<p class="error"><i class="fas fa-times-circle text-danger"></i> Login first to get a token</p>';
            return;
        }

        logToConsole(`<i class="fas fa-satellite-dish"></i> Testing: ${endpoint}`, 'info');

        try {
            // For POST endpoints, send empty body
            const options = {
                method: endpoint === '/api/send-reminder' ? 'POST' : 'GET',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            };

            if (endpoint === '/api/send-reminder') {
                options.body = JSON.stringify({ studentId: 1 });
            }

            const response = await fetch(endpoint, options);
            const contentType = response.headers.get('content-type');
            let responseBody;

            if (contentType && contentType.includes('application/json')) {
                responseBody = await response.json();
            } else {
                responseBody = await response.text();
            }

            const statusColor = response.ok ? 'success' : 'error';
            const statusIcon = response.ok ? '<i class="fas fa-check-circle text-success"></i>' : '<i class="fas fa-times-circle text-danger"></i>';

            logToConsole(`${statusIcon} ${endpoint} → HTTP ${response.status}`, statusColor);

            let html = `<h5>${statusIcon} ${endpoint}</h5>`;
            html += `<p class="${statusColor}"><strong>Status:</strong> ${response.status} ${response.statusText}</p>`;
            html += `<p><strong>Response:</strong></p><pre>${JSON.stringify(responseBody, null, 2)}</pre>`;

            if (response.status === 403) {
                html += '<p class="warning"><i class="fas fa-exclamation-triangle text-warning"></i> Still getting 403 - JWT authorities may not be in effect yet</p>';
            } else if (response.ok) {
                html += '<p class="success"><i class="fas fa-check-circle text-success"></i> Endpoint working! JWT authorities are working</p>';
            }

            resultsDiv.innerHTML += html + '<hr>';
        } catch (e) {
            logToConsole(`<i class="fas fa-times-circle text-danger"></i> Request failed: ${e.message}`, 'error');
            resultsDiv.innerHTML += `<p class="error"><i class="fas fa-times-circle text-danger"></i> Request failed: ${e.message}</p>`;
        }
    }

    function clearStorageAndToken() {
        sessionStorage.removeItem('authToken');
        sessionStorage.removeItem('userRole');  
        localStorage.removeItem('authToken');
        localStorage.removeItem('userRole');
        sessionStorage.clear();
        logToConsole('<i class="fas fa-trash"></i> Cleared all stored tokens and data', 'info');
        document.getElementById('tokenAnalysis').innerHTML = '';
        document.getElementById('endpointResults').innerHTML = '';
    }

    // Log page load
    window.addEventListener('load', () => {
        logToConsole('<i class="fas fa-rocket"></i> JWT Test Page Loaded', 'info');
        
        const token = sessionStorage.getItem('authToken') || localStorage.getItem('authToken');
        if (token) {
            logToConsole(`<i class="fas fa-thumbtack"></i> Token found in localStorage (${token.length} chars)`, 'info');
            decodeAndDisplayToken();
        } else {
            logToConsole('<i class="fas fa-info-circle"></i> No token - please login first', 'info');
        }
    });
</script>
</body>
</html>
