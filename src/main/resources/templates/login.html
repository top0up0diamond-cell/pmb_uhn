<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PMB HKBP Nommensen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a472a;
            --secondary-color: #e74c3c;
        }

        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, #2d5a3d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }

        .login-row {
            display: flex;
        }

        .login-left {
            background: linear-gradient(135deg, var(--primary-color) 0%, #2d5a3d 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            min-height: 500px;
        }

        .login-left h2 {
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .login-left p {
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .login-right {
            padding: 60px 40px;
        }

        .login-right h3 {
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #999;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            color: var(--primary-color);
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(26, 71, 42, 0.25);
        }

        .btn-login {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-size: 1rem;
        }

        .btn-login:hover {
            background: #c0392b;
            color: white;
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .links a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s;
        }

        .links a:hover {
            color: var(--secondary-color);
        }

        .register-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .register-link p {
            margin: 0;
            color: #666;
        }

        .register-link a {
            color: var(--secondary-color);
            font-weight: bold;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .alert {
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
        }

        @media (max-width: 768px) {
            .login-row {
                flex-direction: column;
            }

            .login-left {
                min-height: 200px;
                padding: 40px 20px;
            }

            .login-right {
                padding: 40px 20px;
            }

            .login-left h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-row">
            <!-- Left Side -->
            <div class="login-left col-md-5">
                <div>
                    <i class="fas fa-graduation-cap" style="font-size: 3rem; margin-bottom: 20px;"></i>
                    <h2>Selamat Datang</h2>
                    <p>Masuk ke portal PMB untuk melanjutkan pendaftaran Anda sebagai mahasiswa baru di HKBP Nommensen</p>
                    <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 30px;">Apakah Anda belum memiliki akun?</p>
                    <a href="/register" style="color: white; border: 2px solid white; padding: 10px 30px; border-radius: 5px; text-decoration: none; display: inline-block; transition: all 0.3s;">Daftar Sekarang</a>
                </div>
            </div>

            <!-- Right Side -->
            <div class="login-right col-md-7">
                <h3>Masuk ke Akun Anda</h3>
                <p class="login-subtitle">Gunakan email dan password Anda untuk login</p>

                <!-- Alert Messages -->
                <div id="alertContainer"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Masukkan email Anda" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Masukkan password Anda" required>
                    </div>

                    <button type="submit" class="btn-login">Masuk</button>

                    <div class="links">
                        <a href="/forgot-password">Lupa Password?</a>
                        <a href="/">Kembali ke Beranda</a>
                    </div>

                    <div class="register-link">
                        <p>Belum punya akun? <a href="/register">Daftar di sini</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store token
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userRole', data.role);

                    // <i class="fas fa-check-circle text-success"></i> Redirect based on role
                    if (data.role === 'CAMABA') {
                        window.location.href = '/dashboard-camaba.html';
                    } else if (data.role === 'ADMIN_VALIDASI') {
                        window.location.href = '/dashboard-admin-validasi.html';
                    } else if (data.role === 'ADMIN_PUSAT') {
                        window.location.href = '/dashboard-admin-pusat.html';
                    }
                } else {
                    showAlert(data.message || 'Login gagal', 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Terjadi kesalahan. Silakan coba lagi.', 'danger');
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);
        }
    </script>
</body>
</html>
