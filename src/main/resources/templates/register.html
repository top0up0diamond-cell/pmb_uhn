<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - PMB HKBP Nommensen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a472a;
            --secondary-color: #e74c3c;
        }

        body {
            background-image: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9)), url('/gambar/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            margin: 40px auto;
            padding: 50px 40px;
        }

        .register-container h2 {
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .register-subtitle {
            color: #999;
            text-align: center;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            color: var(--primary-color);
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(26, 71, 42, 0.25);
        }

        .btn-register {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-size: 1rem;
            margin-top: 20px;
        }

        .btn-register:hover {
            background: #c0392b;
            color: white;
        }

        .login-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .login-link p {
            margin: 0;
            color: #666;
        }

        .login-link a {
            color: var(--secondary-color);
            font-weight: bold;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert {
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s;
        }

        .strength-weak { background: #e74c3c; }
        .strength-fair { background: #f39c12; }
        .strength-good { background: #f1c40f; }
        .strength-strong { background: #27ae60; }

        .strength-text {
            font-size: 0.8rem;
            margin-top: 5px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Buat Akun Baru</h2>
        <p class="register-subtitle">Daftar untuk memulai proses penerimaan mahasiswa baru</p>

        <!-- Alert Messages -->
        <div id="alertContainer"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="email">Email <span style="color: red;">*</span></label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Masukkan email Anda" required>
                <small class="text-muted">Gunakan email yang valid, karena akan digunakan untuk verifikasi</small>
            </div>

            <div class="form-group">
                <label for="password">Password <span style="color: red;">*</span></label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Buat password yang kuat" required>
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
                <small class="text-muted">Minimal 8 karakter, kombinasi huruf besar, kecil, dan angka</small>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Konfirmasi Password <span style="color: red;">*</span></label>
                <input type="password" id="passwordConfirm" name="passwordConfirm" class="form-control" placeholder="Ulangi password" required>
            </div>

            <div class="form-check" style="margin-bottom: 25px;">
                <input type="checkbox" id="agreeTerms" name="agreeTerms" class="form-check-input" required>
                <label class="form-check-label" for="agreeTerms">
                    Saya setuju dengan <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a>
                </label>
            </div>

            <button type="submit" class="btn-register">Daftar</button>

            <div class="login-link">
                <p>Sudah punya akun? <a href="/login">Masuk di sini</a></p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Password Strength Checker
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');

            let strength = 0;
            let strengthLabel = '';

            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            switch(strength) {
                case 0:
                    strengthBar.style.width = '0%';
                    strengthText.textContent = '';
                    break;
                case 1:
                    strengthBar.style.width = '20%';
                    strengthBar.className = 'password-strength-bar strength-weak';
                    strengthText.textContent = 'Password lemah';
                    break;
                case 2:
                    strengthBar.style.width = '40%';
                    strengthBar.className = 'password-strength-bar strength-fair';
                    strengthText.textContent = 'Password cukup';
                    break;
                case 3:
                    strengthBar.style.width = '60%';
                    strengthBar.className = 'password-strength-bar strength-good';
                    strengthText.textContent = 'Password baik';
                    break;
                case 4:
                case 5:
                    strengthBar.style.width = '100%';
                    strengthBar.className = 'password-strength-bar strength-strong';
                    strengthText.textContent = 'Password kuat';
                    break;
            }
        });

        // Form Submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;

            if (!agreeTerms) {
                showAlert('Anda harus menyetujui Syarat & Ketentuan', 'warning');
                return;
            }

            if (password !== passwordConfirm) {
                showAlert('Password tidak cocok', 'danger');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password, passwordConfirm })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showAlert('Registrasi berhasil! Silakan login dengan email dan password Anda.', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Registrasi gagal', 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Terjadi kesalahan. Silakan coba lagi.', 'danger');
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);

            // Auto-dismiss success alerts
            if (type === 'success') {
                setTimeout(() => {
                    alert.remove();
                }, 3000);
            }
        }
    </script>
</body>
</html>
